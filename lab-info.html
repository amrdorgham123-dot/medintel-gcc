<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Info — MedForsa GCC</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0E1C; --surface:#121A33; --surface-2:#1B2547; --line: rgba(237,239,247,0.10);
    --plasma:#FF3B5C; --plasma-dim: rgba(255,59,92,0.16);
    --assay:#1FE0CE; --assay-dim: rgba(31,224,206,0.14);
    --gold:#FFB443; --gold-dim: rgba(255,180,67,0.14);
    --paper:#EDEFF7; --muted:#8D95B3;
    --font-display:'Almarai', sans-serif;
    --font-body:'Tajawal', sans-serif;
  }
  body.lang-en{ --font-display:'Space Grotesk', sans-serif; --font-body:'Inter', sans-serif; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--ink); color:var(--paper); font-family:var(--font-body); min-height:100vh; display:flex; flex-direction:column; line-height:1.7;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit;}
  h1,h2,h3,.display{font-family:var(--font-display);}
  .mono{font-family:'IBM Plex Mono', monospace; direction:ltr; unicode-bidi:plaintext;}

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px; border-bottom:1px solid var(--line); background:rgba(10,14,28,0.85);
    position:sticky; top:0; z-index:20; backdrop-filter:blur(10px); flex-wrap:wrap; gap:12px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{width:36px; height:36px; border-radius:10px; background:var(--surface-2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; padding:5px; flex-shrink:0;}
  .brand-mark img{width:100%; height:100%; display:block;}
  .brand-name{font-family:'Almarai'; font-weight:800; font-size:16px;}
  .brand-sub{font-family:'IBM Plex Mono'; font-size:10.5px; color:var(--assay); letter-spacing:1px;}
  .back-link{font-size:13.5px; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .back-link:hover{color:var(--paper);}
  .header-right{display:flex; align-items:center; gap:14px;}
  .lang-toggle{
    font-family:'IBM Plex Mono'; font-size:12.5px; font-weight:500; color:var(--paper);
    background:var(--surface-2); border:1px solid var(--line); border-radius:999px;
    padding:8px 14px; cursor:pointer; letter-spacing:.5px;
  }
  .lang-toggle:hover{border-color:var(--assay); color:var(--assay);}

  .disclaimer{
    background:var(--gold-dim); border-bottom:1px solid rgba(255,180,67,0.3);
    padding:10px 28px; font-size:12.5px; color:var(--paper); text-align:center; line-height:1.6;
  }
  .disclaimer b{color:var(--gold);}

  main{flex:1; width:100%;}
  .wrap{max-width:1180px; margin:0 auto; padding:28px 20px 60px;}

  .page-head{margin-bottom:22px;}
  .page-head h1{font-size:24px; font-weight:800; margin-bottom:6px;}
  .page-head p{color:var(--muted); font-size:14px; max-width:640px;}

  .filters{
    display:grid; grid-template-columns:2fr 1fr; gap:12px;
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:22px;
  }
  .filters input, .filters select{
    width:100%; background:var(--ink); border:1px solid var(--line); border-radius:9px; padding:11px 14px;
    color:var(--paper); font-family:inherit; font-size:14px;
  }
  .filters input:focus, .filters select:focus{outline:none; border-color:var(--assay);}
  @media (max-width:600px){ .filters{grid-template-columns:1fr;} }

  .test-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:14px;}
  .test-card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:18px;
    cursor:pointer; transition:border-color .15s;
  }
  .test-card:hover{border-color:var(--assay);}
  .test-card .cat-tag{
    display:inline-block; font-family:'IBM Plex Mono'; font-size:10.5px; letter-spacing:.5px;
    color:var(--assay); background:var(--assay-dim); padding:4px 10px; border-radius:999px; margin-bottom:10px;
  }
  .test-card h3{font-size:16px; font-weight:700; margin-bottom:4px;}
  .test-card .alt-name{font-size:12.5px; color:var(--muted); margin-bottom:10px;}
  .test-card p{font-size:13px; color:var(--muted); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}

  .empty-state{padding:60px 20px; text-align:center; color:var(--muted);}

  /* ---- Detail view ---- */
  #detailView{display:none;}
  .detail-head{display:flex; align-items:center; gap:14px; margin-bottom:22px; flex-wrap:wrap;}
  .detail-head .back-btn{font-size:13.5px; color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:6px;}
  .detail-head .back-btn:hover{color:var(--paper);}

  .detail-layout{display:grid; grid-template-columns:220px 1fr; gap:24px; align-items:start;}
  @media (max-width:820px){ .detail-layout{grid-template-columns:1fr;} .onpage-nav{position:static !important; margin-bottom:20px;} }

  .onpage-nav{
    position:sticky; top:88px; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    overflow:hidden;
  }
  .onpage-nav .onpage-head{
    background:var(--surface-2); padding:12px 16px; font-size:12.5px; font-weight:700;
    letter-spacing:.3px;
  }
  .onpage-nav ul{list-style:none; padding:8px 0;}
  .onpage-nav li{display:flex; align-items:center; gap:8px; padding:8px 16px; font-size:13px; color:var(--muted); cursor:pointer; transition:color .15s;}
  .onpage-nav li:hover{color:var(--paper);}
  .onpage-nav li .marker{width:12px; flex-shrink:0; font-size:11px; color:var(--assay); opacity:0;}
  .onpage-nav li.active{color:var(--assay); font-weight:600;}
  .onpage-nav li.active .marker{opacity:1;}
  .onpage-nav li.active::before{content:none;}
  .detail-content{min-width:0;}

  .detail-title{margin-bottom:26px;}
  .detail-title .cat-tag{
    display:inline-block; font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.5px;
    color:var(--assay); background:var(--assay-dim); padding:5px 12px; border-radius:999px; margin-bottom:12px;
  }
  .detail-title h1{font-size:26px; font-weight:800; margin-bottom:6px;}
  .detail-title .alt{font-size:13.5px; color:var(--muted);}

  .section-card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:22px; margin-bottom:16px;
  }
  .section-card h2{font-size:15px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px;}
  .section-card h2 .dot{width:7px; height:7px; border-radius:50%; background:var(--assay); flex-shrink:0;}
  .section-card p{font-size:14.5px; line-height:1.9; color:var(--paper);}
  .critical-card{border-color:rgba(255,59,92,0.35); background:rgba(255,59,92,0.06);}
  .critical-card h2{color:var(--plasma);}
  .critical-dot{background:var(--plasma) !important;}

  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:700px){ .grid-2{grid-template-columns:1fr;} }

  .range-table{width:100%; border-collapse:collapse; font-size:13.5px;}
  .range-table th{
    text-align:right; font-family:'IBM Plex Mono'; font-size:10.5px; letter-spacing:.5px; color:var(--muted);
    padding:10px 12px; border-bottom:1px solid var(--line); text-transform:uppercase;
  }
  .range-table td{padding:12px; border-bottom:1px solid var(--line); vertical-align:top;}
  .range-table tr:last-child td{border-bottom:none;}
  .range-table .val{font-family:'IBM Plex Mono'; direction:ltr; unicode-bidi:plaintext; color:var(--assay); font-weight:500;}
  .range-table .note{color:var(--muted); font-size:12px;}

  .verify-badge{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:6px 12px; border-radius:999px;
    margin-bottom:14px;
  }
  .verify-badge.verified{background:var(--assay-dim); color:var(--assay);}
  .verify-badge.unverified{background:var(--gold-dim); color:var(--gold);}

  .cond-list{list-style:none; display:flex; flex-direction:column; gap:8px;}
  .cond-list li{
    display:flex; justify-content:space-between; gap:10px; font-size:13.5px;
    padding:10px 12px; background:var(--ink); border:1px solid var(--line); border-radius:9px;
  }
  .cond-list .dir{font-family:'IBM Plex Mono'; font-size:11.5px; color:#8FD9CE; white-space:nowrap;}

  .source-list{list-style:none; display:flex; flex-direction:column; gap:10px;}

  .related-chips{display:flex; flex-wrap:wrap; gap:10px;}
  .related-chip{
    background:var(--ink); border:1px solid var(--line); color:var(--paper);
    font-size:13px; padding:9px 16px; border-radius:999px; cursor:pointer; transition:border-color .15s, color .15s;
  }
  .related-chip:hover{border-color:var(--assay); color:var(--assay);}
  .source-list li{font-size:13px; color:var(--muted); padding-inline-start:16px; position:relative; line-height:1.7;}
  .source-list li::before{content:'—'; position:absolute; inset-inline-start:0;}
  .source-list a{color:var(--assay);}
  .source-list a:hover{text-decoration:underline;}
  .source-meta{font-family:'IBM Plex Mono'; font-size:10.5px; color:var(--muted); display:block; margin-top:2px;}

  .loading{padding:60px 20px; text-align:center; color:var(--muted); font-size:14px;}
</style>
</head>
<body>

<header>
  <a class="back-link" href="/app" data-ar="&larr; رجوع" data-en="&larr; Back"></a>
  <div class="brand">
    <div class="brand-mark"><img src="/logo.svg" alt="MedForsa GCC"></div>
    <div>
      <div class="brand-name" data-ar="معلومات التحاليل" data-en="Lab Info"></div>
      <div class="brand-sub mono">MEDFORSA GCC</div>
    </div>
  </div>
  <div class="header-right">
    <button class="lang-toggle" id="langBtn" data-lang-toggle>EN</button>
  </div>
</header>

<div class="disclaimer">
  <span data-ar="مرجع علمي للمختبرات والأطباء فقط — ليس بديلاً عن حكم الطبيب المعالج أو السياسات المعتمدة في مختبرك." data-en="A scientific reference for laboratories and physicians only — not a substitute for the treating physician's judgment or your lab's approved policies."></span>
</div>

<main>
  <div class="wrap">

    <!-- LIST VIEW -->
    <div id="listView">
      <div class="page-head">
        <h1 data-ar="Lab Info — معلومات التحاليل" data-en="Lab Info"></h1>
        <p data-ar="مرجع منظم لأشهر التحاليل المخبرية: الغرض، نوع العينة، المنهجية، القيم المرجعية، والدلالة الإكلينيكية — كل معلومة موثّقة بمصدرها." data-en="A structured reference for common lab tests: purpose, specimen type, methodology, reference ranges, and clinical significance — every fact is sourced."></p>
      </div>

      <div class="filters">
        <input type="text" id="searchInput" data-ar-placeholder="ابحث باسم التحليل (عربي أو إنجليزي)..." data-en-placeholder="Search by test name (Arabic or English)..." placeholder="">
        <select id="categorySelect"></select>
      </div>

      <div id="gridWrap" class="test-grid"></div>
      <div id="loadingList" class="loading" data-ar="جاري التحميل..." data-en="Loading..."></div>
      <div id="emptyState" class="empty-state" style="display:none;" data-ar="لا توجد نتائج مطابقة." data-en="No matching results."></div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailView">
      <div class="detail-head">
        <span class="back-btn" id="backToList">
          <span data-ar="&larr; رجوع للدليل" data-en="&larr; Back to guide"></span>
        </span>
      </div>
      <div class="detail-layout">
        <nav class="onpage-nav" id="onpageNav">
          <div class="onpage-head" data-ar="في هذه الصفحة" data-en="On this page"></div>
          <ul id="onpageList"></ul>
        </nav>
        <div class="detail-content" id="detailContent"></div>
      </div>
    </div>

  </div>
</main>

<script src="/lang.js"></script>
<script>
(function(){
  const listView = document.getElementById('listView');
  const detailView = document.getElementById('detailView');
  const gridWrap = document.getElementById('gridWrap');
  const loadingList = document.getElementById('loadingList');
  const emptyState = document.getElementById('emptyState');
  const searchInput = document.getElementById('searchInput');
  const categorySelect = document.getElementById('categorySelect');
  const detailContent = document.getElementById('detailContent');
  const backToList = document.getElementById('backToList');
  const onpageNav = document.getElementById('onpageNav');
  const onpageList = document.getElementById('onpageList');

  let currentLang = document.documentElement.lang || 'ar';
  let currentResults = [];
  let currentDetail = null;
  let searchTimer = null;

  function L(){ return currentLang; }

  async function loadCategories(){
    try{
      const res = await fetch('/lab-tests-categories');
      const data = await res.json();
      const allOptText = L()==='ar' ? 'كل الفئات' : 'All categories';
      categorySelect.innerHTML = '<option value="">' + allOptText + '</option>' +
        data.categories.map(c => '<option value="'+c.category+'">'+c.category+' ('+c.c+')</option>').join('');
    }catch(e){ /* categories are non-critical */ }
  }

  async function loadList(){
    loadingList.style.display = 'block';
    emptyState.style.display = 'none';
    gridWrap.innerHTML = '';
    const params = new URLSearchParams();
    if(searchInput.value.trim()) params.set('q', searchInput.value.trim());
    if(categorySelect.value) params.set('category', categorySelect.value);
    params.set('limit', '100');
    try{
      const res = await fetch('/lab-tests-list?' + params.toString());
      const data = await res.json();
      currentResults = data.results || [];
      renderGrid();
    }catch(e){
      loadingList.textContent = L()==='ar' ? 'تعذر تحميل الدليل. حاول مرة أخرى.' : 'Could not load the guide. Please try again.';
      return;
    }
    loadingList.style.display = 'none';
  }

  function renderGrid(){
    gridWrap.innerHTML = '';
    if(currentResults.length === 0){
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';
    currentResults.forEach(function(t){
      const card = document.createElement('div');
      card.className = 'test-card';
      // Lab test data is always shown in English, regardless of the site's AR/EN toggle.
      const name = t.name_en;
      const altName = t.name_ar || t.aliases || '';
      const purpose = t.purpose_en || '';
      card.innerHTML =
        '<span class="cat-tag">' + t.category + '</span>' +
        '<h3>' + name + '</h3>' +
        '<div class="alt-name mono">' + altName + '</div>' +
        '<p>' + purpose + '</p>';
      card.addEventListener('click', function(){ openDetail(t.slug); });
      gridWrap.appendChild(card);
    });
  }

  async function openDetail(slug){
    listView.style.display = 'none';
    detailView.style.display = 'block';
    detailContent.innerHTML = '<div class="loading">' + (L()==='ar'?'جاري التحميل...':'Loading...') + '</div>';
    window.scrollTo(0,0);
    try{
      const res = await fetch('/lab-tests-detail/' + encodeURIComponent(slug));
      if(!res.ok) throw new Error('not found');
      currentDetail = await res.json();
      renderDetail();
    }catch(e){
      detailContent.innerHTML = '<div class="loading">' + (L()==='ar'?'تعذر تحميل التحليل.':'Could not load this test.') + '</div>';
    }
  }

  function esc(s){ return (s||'').toString(); }

  function renderDetail(){
    if(!currentDetail) return;
    const t = currentDetail;
    const ar = L()==='ar'; // controls UI chrome labels only -- test content itself stays English
    const name = t.name_en;
    const altName = t.name_ar || t.aliases || '';
    const sections = []; // {id, ar, en} -- built as we go, drives the "On this page" nav

    let html = '';
    html += '<div class="detail-title">';
    html += '<span class="cat-tag">' + esc(t.category) + '</span>';
    html += '<h1>' + esc(name) + '</h1>';
    html += '<div class="alt mono">' + esc(altName) + (t.aliases ? ' · ' + esc(t.aliases) : '') + '</div>';
    html += '</div>';

    // Purpose
    const purpose = t.purpose_en;
    if(purpose){
      sections.push({id:'sec-purpose', ar:'الغرض من التحليل', en:'Purpose'});
      html += '<div class="section-card" id="sec-purpose"><h2><span class="dot"></span>' + (ar?'الغرض من التحليل':'Purpose') + '</h2><p>' + esc(purpose) + '</p></div>';
    }

    // Specimen + collection
    sections.push({id:'sec-specimen', ar:'نوع العينة والسحب', en:'Specimen & Collection'});
    html += '<div class="grid-2" id="sec-specimen">';
    html += '<div class="section-card"><h2><span class="dot"></span>' + (ar?'نوع العينة':'Specimen Type') + '</h2><p>' + esc(t.specimen_type||'—') + '</p></div>';
    const collection = t.collection_notes_en;
    html += '<div class="section-card"><h2><span class="dot"></span>' + (ar?'طريقة السحب/الجمع':'Collection Notes') + '</h2><p>' + esc(collection||'—') + '</p></div>';
    html += '</div>';

    // Methodology
    const method = t.methodology_en;
    if(method){
      sections.push({id:'sec-methodology', ar:'المنهجية', en:'Methodology'});
      html += '<div class="section-card" id="sec-methodology"><h2><span class="dot"></span>' + (ar?'المنهجية (Methodology)':'Methodology') + '</h2><p>' + esc(method) + '</p></div>';
    }

    // Reference ranges
    sections.push({id:'sec-ranges', ar:'القيم المرجعية', en:'Reference Ranges'});
    html += '<div class="section-card" id="sec-ranges">';
    html += '<h2><span class="dot"></span>' + (ar?'القيم المرجعية':'Reference Ranges') + '</h2>';
    html += '<span class="verify-badge ' + (t.reference_ranges_verified?'verified':'unverified') + '">' +
      (t.reference_ranges_verified ? (ar?'✓ موثّقة من مصدر معتمد':'✓ Verified from a cited source') : (ar?'⚠ غير مؤكدة — راجع مصدرًا محليًا':'⚠ Unconfirmed — verify against a local reference')) +
      '</span>';
    if(t.reference_ranges && t.reference_ranges.length){
      html += '<table class="range-table"><thead><tr>' +
        '<th>' + (ar?'المؤشر':'Parameter') + '</th>' +
        '<th>' + (ar?'الفئة':'Population') + '</th>' +
        '<th>' + (ar?'القيمة':'Range') + '</th>' +
        '</tr></thead><tbody>';
      t.reference_ranges.forEach(function(r){
        html += '<tr><td>' + esc(r.parameter||'') + '</td><td>' + esc(r.population||'') + '</td>' +
          '<td><span class="val">' + esc(r.range||'') + '</span>' +
          (r.notes ? '<div class="note">' + esc(r.notes) + '</div>' : '') + '</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p style="color:var(--muted); font-size:13.5px;">' + (ar?'لا توجد قيم مرجعية موثقة بعد لهذا التحليل.':'No documented reference ranges yet for this test.') + '</p>';
    }
    html += '</div>';

    // Clinical significance
    const sig = t.clinical_significance_en;
    if(sig){
      sections.push({id:'sec-significance', ar:'الدلالة الإكلينيكية', en:'Clinical Significance'});
      html += '<div class="section-card" id="sec-significance"><h2><span class="dot"></span>' + (ar?'الدلالة الإكلينيكية':'Clinical Significance') + '</h2><p>' + esc(sig) + '</p></div>';
    }

    // Critical values
    const crit = t.critical_values_en;
    if(crit){
      sections.push({id:'sec-critical', ar:'القيم الحرجة', en:'Critical Values'});
      html += '<div class="section-card critical-card" id="sec-critical"><h2><span class="dot critical-dot"></span>' + (ar?'⚠ القيم الحرجة (تستوجب إبلاغًا فوريًا)':'⚠ Critical Values (require immediate notification)') + '</h2><p>' + esc(crit) + '</p></div>';
    }

    // Interfering factors
    const interf = t.interfering_factors_en;
    if(interf){
      sections.push({id:'sec-interfering', ar:'عوامل مؤثرة على النتيجة', en:'Interfering Factors'});
      html += '<div class="section-card" id="sec-interfering"><h2><span class="dot"></span>' + (ar?'عوامل مؤثرة على النتيجة':'Interfering Factors') + '</h2><p>' + esc(interf) + '</p></div>';
    }

    // Associated conditions
    if(t.associated_conditions && t.associated_conditions.length){
      sections.push({id:'sec-conditions', ar:'حالات مرضية مرتبطة', en:'Associated Conditions'});
      html += '<div class="section-card" id="sec-conditions"><h2><span class="dot"></span>' + (ar?'حالات مرضية مرتبطة':'Associated Conditions') + '</h2><ul class="cond-list">';
      t.associated_conditions.forEach(function(c){
        html += '<li><span>' + esc(c.condition||'') + '</span><span class="dir mono">' + esc(c.direction||'') + '</span></li>';
      });
      html += '</ul></div>';
    }

    // Related tests (Sources are intentionally not rendered here -- kept internal
    // for MedForsa GCC's own verification trail, not shown in the public UI)
    if(t.related_tests && t.related_tests.length){
      sections.push({id:'sec-related', ar:'تحاليل مرتبطة', en:'Related Tests'});
      html += '<div class="section-card" id="sec-related"><h2><span class="dot"></span>' + (ar?'تحاليل مرتبطة':'Related Tests') + '</h2><div class="related-chips">';
      t.related_tests.forEach(function(rt){
        html += '<span class="related-chip" data-slug="' + esc(rt.slug) + '">' + esc(rt.name_en) + '</span>';
      });
      html += '</div></div>';
    }

    detailContent.innerHTML = html;
    detailContent.querySelectorAll('.related-chip').forEach(function(chip){
      chip.addEventListener('click', function(){ openDetail(chip.dataset.slug); });
    });
    renderOnpageNav(sections, ar);
  }

  let scrollSpyHandler = null;

  function renderOnpageNav(sections, ar){
    if(!sections.length){ onpageNav.style.display = 'none'; return; }
    onpageNav.style.display = 'block';
    onpageList.innerHTML = sections.map(function(s, i){
      return '<li data-target="' + s.id + '"' + (i===0?' class="active"':'') + '>' +
        '<span class="marker">' + (ar?'◂':'▸') + '</span><span>' + (ar?s.ar:s.en) + '</span></li>';
    }).join('');

    onpageList.querySelectorAll('li').forEach(function(li){
      li.addEventListener('click', function(){
        const target = document.getElementById(li.dataset.target);
        if(target){
          const y = target.getBoundingClientRect().top + window.pageYOffset - 78;
          window.scrollTo({top: y, behavior:'smooth'});
        }
      });
    });

    if(scrollSpyHandler) window.removeEventListener('scroll', scrollSpyHandler);
    scrollSpyHandler = function(){
      let currentId = sections[0].id;
      for(const s of sections){
        const el = document.getElementById(s.id);
        if(el && el.getBoundingClientRect().top - 96 <= 0) currentId = s.id;
      }
      onpageList.querySelectorAll('li').forEach(function(li){
        li.classList.toggle('active', li.dataset.target === currentId);
      });
    };
    window.addEventListener('scroll', scrollSpyHandler, {passive:true});
    scrollSpyHandler();
  }

  backToList.addEventListener('click', function(){
    detailView.style.display = 'none';
    listView.style.display = 'block';
    currentDetail = null;
    if(scrollSpyHandler){ window.removeEventListener('scroll', scrollSpyHandler); scrollSpyHandler = null; }
    if(window.history && window.history.replaceState){
      window.history.replaceState({}, '', '/lab-info');
    }
    if(currentResults.length === 0) loadList();
  });

  searchInput.addEventListener('input', function(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadList, 300);
  });
  categorySelect.addEventListener('change', loadList);

  document.addEventListener('medintel:langchange', function(e){
    currentLang = e.detail.lang;
    renderGrid();
    if(currentDetail) renderDetail();
    loadCategories();
  });

  // init
  if(window.MedForsaLang){ MedForsaLang.initLangToggle('ar'); }
  currentLang = document.documentElement.lang || 'ar';
  loadCategories();
  const deepLinkSlug = new URLSearchParams(window.location.search).get('slug');
  if(deepLinkSlug){
    listView.style.display = 'none';
    openDetail(deepLinkSlug);
  } else {
    loadList();
  }
})();
</script>

</body>
</html>
