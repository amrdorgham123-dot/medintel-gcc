<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedForsa GCC — Blood Bank Intelligence Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16241F; --ink-soft:#4A5750; --ink-muted:#7C8A82;
    --paper:#F2F5F7; --surface:#FFFFFF; --surface-sunk:#EFF2EE; --border:#DCE1DC; --border-strong:#C3CBC3;
    --accent:#0E5C53; --accent-deep:#0A4038; --accent-soft:#E3F1EC;
    --gold:#9C7A1F; --gold-bg:#FBF2DA; --gold-brand:#CFA74A;
    --silver:#64707A; --silver-bg:#ECEFF1;
    --bronze:#8B4B26; --bronze-bg:#F6E7DC;
    --signal:#B3492E; --signal-bg:#FBEAE5;
    --sans:'Poppins',-apple-system,BlinkMacSystemFont,sans-serif;
    --display:'Playfair Display',Georgia,serif;
    --mono:'JetBrains Mono',SFMono-Regular,Menlo,monospace;
    --radius:10px;
    /* Enterprise chrome layer -- nav shell, topbar, KG/Regulatory pages */
    --ent-blue:#0B3B66; --ent-blue-deep:#072944; --ent-blue-soft:#E6EEF6;
    --ent-cyan:#1FA8C9; --ent-cyan-soft:#E3F6FB;
    --ent-emerald:#0F9D6B; --ent-emerald-soft:#E5F7EF;
    --ent-amber:#C58A1F; --ent-amber-soft:#FBF1DC;
    --ent-red:#C1432E; --ent-red-soft:#FBE9E5;
    --ent-ink:#101820; --ent-ink-soft:#4C5A68; --ent-line:#DDE4EA;
    /* Global platform theme -- medical sky-blue + carbon, toggled via [data-theme] */
    --sky:#0EA5E9; --sky-soft:#E3F4FC; --sky-deep:#0876AC;
    --carbon:#111827; --carbon-panel:#1A2333; --carbon-line:#2A3549;
    --glass-bg:rgba(255,255,255,.6); --glass-border:rgba(255,255,255,.4); --glass-blur:14px;
  }
  [data-theme="dark"]{
    --ink:#E7ECF3; --ink-soft:#AEB9C7; --ink-muted:#7C8898;
    --paper:#0B1220; --surface:#141C2C; --surface-sunk:#101828; --border:#233047; --border-strong:#324362;
    --accent:var(--sky); --accent-deep:var(--sky-deep); --accent-soft:#0F2C3D;
    --ent-blue-soft:#122439; --ent-cyan-soft:#0F2C3D; --ent-line:#233047;
    --glass-bg:rgba(20,28,44,.55); --glass-border:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;}
  *:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;font-size:14px;transition:background .25s ease,color .25s ease;}
  .sidebar, .topbar, .card, .pcard, .metric, .attieh-page{transition:background .25s ease,border-color .25s ease,color .25s ease;}
  ::selection{background:var(--accent-soft);color:var(--accent-deep);}

  .app{display:flex;min-height:100vh;}

  .sidebar{width:236px;flex-shrink:0;background:var(--ent-blue-deep);border-right:1px solid #051D30;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{padding:22px 20px 16px;}
  .brand-name{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.2px;color:#F1F6FA;}
  .brand-tagline{font-family:var(--sans);font-size:9px;letter-spacing:1.5px;color:var(--ent-cyan);text-transform:uppercase;margin-top:2px;font-weight:600;}
  .brand-tag{font-family:var(--mono);font-size:10.5px;color:#8FA8BE;margin-top:3px;}
  .ladder{display:flex;gap:4px;margin-top:12px;}
  .ladder span{width:22px;height:5px;border-radius:3px;}
  .ladder .g{background:var(--gold);} .ladder .s{background:var(--silver);} .ladder .b{background:var(--bronze);}
  .ladder-caption{font-family:var(--mono);font-size:9.5px;color:#8FA8BE;margin-top:6px;}

  nav.railnav{padding:8px 12px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
  nav.railnav .rail-group-label{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#5E7A93;padding:14px 12px 4px;}
  nav.railnav button{
    display:flex;align-items:center;gap:10px;background:none;border:none;text-align:left;
    padding:9px 12px;border-radius:8px;font-family:var(--sans);font-size:13.5px;font-weight:500;
    color:#B9CBDB;cursor:pointer;
  }
  nav.railnav button svg{width:16px;height:16px;flex-shrink:0;opacity:.75;}
  nav.railnav button:hover{background:rgba(255,255,255,.06);color:#F1F6FA;}
  nav.railnav button.active{background:var(--ent-cyan);color:var(--ent-blue-deep);font-weight:600;}
  nav.railnav button.active svg{opacity:1;}

  .rail-footer{padding:14px 20px 18px;border-top:1px solid rgba(255,255,255,.08);}
  .conn-chip{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:#8FA8BE;}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:#5E7A93;}
  .conn-dot.live{background:var(--ent-emerald);}
  .conn-dot.down{background:var(--ent-red);}

  .main-col{flex:1;min-width:0;}
  .topbar{display:flex;align-items:center;gap:14px;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:5;}
  .topbar h1{font-size:17px;margin:0;font-weight:700;flex-shrink:0;font-family:var(--display);color:var(--ent-blue);}
  .topbar-icons{display:flex;align-items:center;gap:6px;margin-left:auto;}
  .topbar-icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);cursor:pointer;position:relative;text-decoration:none;}
  .topbar-icon-btn:hover{background:var(--surface-sunk);}
  .topbar-icon-btn svg{width:16px;height:16px;}
  .topbar-icon-btn .dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--ent-red);}
  .breadcrumb{font-family:var(--mono);font-size:10.5px;color:var(--ink-muted);padding:9px 32px 0;}
  .breadcrumb span.sep{margin:0 5px;opacity:.5;}
  .breadcrumb span.cur{color:var(--ent-blue);font-weight:600;}
  .search-wrap{flex:1;max-width:420px;position:relative;}
  .search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;background:var(--surface-sunk);}
  .search-wrap input:focus{background:var(--surface);}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ink-muted);}
  .search-hint{font-family:var(--mono);font-size:10.5px;color:var(--ink-muted);}

  main{padding:16px 32px 60px;max-width:960px;}


  button.primary{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);}
  button.primary:hover{background:var(--accent-deep);}
  button.ghost{background:none;border:1px solid var(--border-strong);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--ink-soft);font-family:var(--sans);}
  button.ghost:hover{background:var(--surface-sunk);}
  select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;background:var(--surface);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap;}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px;}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
  .metric .num{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--accent-deep);}
  .metric .label{font-size:12px;color:var(--ink-soft);margin-top:3px;}

  .section-title{font-size:13px;font-weight:600;margin:0 0 12px;color:var(--ink);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;justify-content:space-between;}
  .section{margin-bottom:30px;}
  .section-link{font-family:var(--sans);font-size:11px;text-transform:none;letter-spacing:0;font-weight:600;color:var(--ent-blue);cursor:pointer;}
  .dash-cols{display:grid;grid-template-columns:1.3fr 1fr;gap:32px;align-items:start;}
  @media(max-width:800px){ .dash-cols{grid-template-columns:1fr;} }

  .grid{display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
  .card:hover{border-color:var(--accent);box-shadow:0 1px 3px rgba(11,110,92,.08);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
  .card-top h3{margin:0;font-size:14.5px;font-weight:600;}
  .card-top .meta{font-size:12px;color:var(--ink-soft);margin-top:4px;}

  .badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;white-space:nowrap;letter-spacing:.2px;}
  .badge.gold{background:var(--gold-bg);color:var(--gold);}
  .badge.silver{background:var(--silver-bg);color:var(--silver);}
  .badge.bronze{background:var(--bronze-bg);color:var(--bronze);}
  .badge.open{background:var(--signal-bg);color:var(--signal);}
  .badge.unclear{background:var(--gold-bg);color:var(--gold);}
  .badge.covered{background:var(--silver-bg);color:var(--silver);}

  .score-num{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent-deep);}
  .score-bar-track{background:var(--border);border-radius:5px;height:8px;overflow:hidden;margin:8px 0;}
  .score-bar-fill{background:var(--accent);height:100%;}

  .row{display:flex;gap:10px;margin-bottom:9px;font-size:13.5px;}
  .row .label{min-width:150px;font-weight:600;color:var(--ink);flex-shrink:0;}
  .row .val{color:var(--ink-soft);}

  .source-trace{margin-top:8px;padding:11px 13px;background:var(--accent-soft);border-radius:8px;font-family:var(--mono);font-size:11.5px;color:var(--accent-deep);line-height:1.65;}
  .insight-box{background:var(--surface-sunk);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:13px 16px;font-size:13.5px;color:var(--ink-soft);margin-bottom:20px;}
  .insight-box b{color:var(--ink);}

  .conf-days{font-family:var(--mono);font-weight:600;color:var(--accent-deep);}
  .conf-days.past{color:var(--signal);}

  .not-verified{font-style:italic;color:var(--gold);background:var(--gold-bg);padding:9px 12px;border-radius:8px;font-size:12.5px;}
  .empty{font-size:13px;color:var(--ink-muted);font-style:italic;padding:24px 0;}
  .conn-error{background:var(--signal-bg);color:var(--signal);padding:16px 18px;border-radius:var(--radius);font-size:13px;}

  .skel{background:linear-gradient(90deg,var(--surface-sunk) 25%,var(--border) 37%,var(--surface-sunk) 63%);background-size:400% 100%;border-radius:var(--radius);height:64px;margin-bottom:10px;}
  @media (prefers-reduced-motion: no-preference){ .skel{animation:shimmer 1.4s ease infinite;} }
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}

  .detail-back{background:none;border:none;color:var(--accent-deep);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:18px;padding:0;display:flex;align-items:center;gap:5px;}
  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px;}
  .detail-head h2{margin:0;font-size:23px;font-weight:700;font-family:var(--display);color:var(--accent-deep);}
  .detail-head .meta{font-size:13px;color:var(--ink-soft);margin-top:4px;}
  .detail-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
  .detail-tabs button{background:none;border:none;font-size:13px;font-weight:600;padding:9px 12px;cursor:pointer;color:var(--ink-muted);border-bottom:2px solid transparent;font-family:var(--sans);}
  .detail-tabs button.active{color:var(--accent-deep);border-bottom-color:var(--accent);}

  .modal-backdrop{position:fixed;inset:0;background:rgba(22,36,31,.5);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px;overflow-y:auto;z-index:50;}
  .modal{background:var(--surface);border-radius:14px;padding:26px;max-width:480px;width:100%;}
  .modal h3{margin:0 0 4px;font-size:17px;}
  .modal .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px;line-height:1.5;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px;}
  .field input, .field select, .field textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

  .toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:100;}
  .toast{background:var(--ink);color:var(--paper);padding:12px 16px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.18);max-width:320px;}
  .toast.err{background:var(--signal);}

  @media (max-width: 760px){
    .sidebar{position:fixed;left:-236px;transition:left .18s;z-index:20;box-shadow:2px 0 12px rgba(0,0,0,.08);}
    .sidebar.open{left:0;}
    .menu-btn{display:flex !important;}
    main{padding:20px 16px 50px;}
    .topbar{padding:14px 16px;}
  }
  .menu-btn{display:none;background:none;border:1px solid var(--border);border-radius:8px;padding:7px;cursor:pointer;}

  /* ===== Attieh Medico showcase page — distinct brand skin, scoped to .attieh-page ===== */
  .attieh-page{
    --a-navy:#132A2E; --a-navy-deep:#0B1C1F; --a-cream:#FBF7EE; --a-cream-line:#E7DEC8;
    --a-brass:#B0812E; --a-brass-soft:#F1E4C6; --a-ink:#26312F; --a-ink-soft:#5B6663;
    margin:-28px -32px -60px; background:var(--a-cream); font-family:var(--sans);
  }
  .attieh-hero{
    background:radial-gradient(1100px 460px at 12% -10%, #1D3D42 0%, var(--a-navy) 46%, var(--a-navy-deep) 100%);
    color:#F4EFE1; padding:56px 44px 40px; position:relative; overflow:hidden;
  }
  .attieh-hero::after{
    content:""; position:absolute; right:-60px; top:-60px; width:340px; height:340px; border-radius:50%;
    background:radial-gradient(circle, rgba(176,129,46,.22) 0%, transparent 70%);
  }
  .attieh-eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--a-brass); opacity:.95;}
  .attieh-hero h1{font-family:var(--display); font-weight:700; font-size:44px; line-height:1.05; margin:10px 0 4px; letter-spacing:-.5px;}
  .attieh-hero .ar-name{font-family:var(--sans); font-size:17px; color:#CFC7AE; margin-bottom:14px;}
  .attieh-hero .tagline{font-size:15px; max-width:560px; color:#DCD5C1; line-height:1.6;}
  .coverage-strip{display:flex; flex-wrap:wrap; gap:8px; margin-top:26px;}
  .coverage-chip{
    font-family:var(--mono); font-size:11px; color:#F4EFE1; background:rgba(255,255,255,.08);
    border:1px solid rgba(244,239,225,.28); border-radius:999px; padding:6px 13px; letter-spacing:.3px;
  }
  .coverage-chip b{color:var(--a-brass); font-weight:700; margin-right:5px;}
  .attieh-stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1px; background:var(--a-cream-line); border-top:1px solid var(--a-cream-line); border-bottom:1px solid var(--a-cream-line);}
  .attieh-stat{background:var(--a-cream); padding:20px 24px;}
  .attieh-stat .n{font-family:var(--display); font-weight:700; font-size:30px; color:var(--a-navy);}
  .attieh-stat .l{font-family:var(--sans); font-size:11.5px; color:var(--a-ink-soft); margin-top:2px; text-transform:uppercase; letter-spacing:.6px;}
  .attieh-body{padding:44px 44px 56px;}
  .attieh-section{margin-bottom:42px;}
  .attieh-section-head{display:flex; align-items:baseline; gap:12px; margin-bottom:16px; border-bottom:1.5px solid var(--a-navy); padding-bottom:9px;}
  .attieh-section-head h2{font-family:var(--display); font-size:21px; color:var(--a-navy); margin:0; font-weight:700;}
  .attieh-section-head .count{font-family:var(--mono); font-size:12px; color:var(--a-brass); font-weight:600;}
  .attieh-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px;}
  .attieh-card{
    background:#fff; border:1px solid var(--a-cream-line); border-radius:4px; padding:17px 18px;
    position:relative; transition:box-shadow .15s, transform .15s;
  }
  .attieh-card:hover{box-shadow:0 6px 18px rgba(19,42,46,.1); transform:translateY(-2px);}
  .attieh-card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--a-brass); border-radius:4px 0 0 4px;}
  .attieh-card h3{font-family:var(--display); font-size:16px; margin:0 0 4px; color:var(--a-navy); font-weight:700;}
  .attieh-card .country{font-family:var(--mono); font-size:10.5px; color:var(--a-brass); text-transform:uppercase; letter-spacing:.5px;}
  .attieh-card p{font-size:12.5px; color:var(--a-ink-soft); margin:8px 0 0; line-height:1.5;}
  .attieh-footer{
    background:var(--a-brass-soft); border-top:1px solid var(--a-cream-line); padding:20px 44px;
    font-size:11.5px; color:var(--a-ink-soft); line-height:1.6;
  }
  .attieh-footer b{color:var(--a-navy);}
  @media(max-width:640px){
    .attieh-page{margin:-20px -16px -40px;}
    .attieh-hero, .attieh-body, .attieh-footer{padding-left:20px; padding-right:20px;}
    .attieh-hero h1{font-size:32px;}
  }
  .attieh-banner{
    display:flex; align-items:center; justify-content:space-between; gap:16px; cursor:pointer;
    background:linear-gradient(120deg, #132A2E 0%, #1D3D42 100%); border-radius:12px;
    padding:18px 24px; margin-bottom:22px; transition:transform .15s, box-shadow .15s;
    border:1px solid #0B1C1F;
  }
  .attieh-banner:hover{transform:translateY(-1px); box-shadow:0 8px 22px rgba(19,42,46,.25);}
  .attieh-banner-eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#B0812E;}
  .attieh-banner-title{font-family:var(--display); font-weight:700; font-size:20px; color:#F4EFE1; margin-top:2px;}
  .attieh-banner-sub{font-family:var(--sans); font-size:12px; color:#CFC7AE; margin-top:3px;}
  .attieh-banner-cta{font-family:var(--sans); font-size:12.5px; font-weight:600; color:#F4EFE1; background:rgba(255,255,255,.1); border:1px solid rgba(244,239,225,.3); padding:9px 16px; border-radius:8px; white-space:nowrap;}
  @media(max-width:560px){ .attieh-banner{flex-direction:column; align-items:flex-start;} }
  .snibe-banner{
    display:flex; align-items:center; justify-content:space-between; gap:20px; cursor:pointer;
    background:linear-gradient(120deg, #08324A 0%, #0E4A68 100%); border-radius:12px;
    padding:20px 26px; margin-bottom:14px; transition:transform .15s, box-shadow .15s;
    border:1px solid #062338;
  }
  .snibe-banner:hover{transform:translateY(-1px); box-shadow:0 8px 22px rgba(8,50,74,.3);}
  .snibe-banner-left{flex:1; min-width:0;}
  .snibe-banner-eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#5CC9E8;}
  .snibe-banner-title{font-family:var(--display); font-weight:700; font-size:22px; color:#F0FAFD; margin-top:3px;}
  .snibe-banner-sub{font-family:var(--sans); font-size:12.5px; color:#AFDCEC; margin-top:4px; max-width:520px;}
  .snibe-chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:12px;}
  .snibe-chip{font-family:var(--mono); font-size:10.5px; color:#EAFAFF; background:rgba(255,255,255,.09); border:1px solid rgba(92,201,232,.35); border-radius:999px; padding:5px 12px;}
  .snibe-banner-cta{font-family:var(--sans); font-size:12.5px; font-weight:600; color:#062338; background:#5CC9E8; border:1px solid #5CC9E8; padding:10px 18px; border-radius:8px; white-space:nowrap;}
  @media(max-width:640px){ .snibe-banner{flex-direction:column; align-items:flex-start;} }
  .kg-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}

async function apiGet(path){
  const res = await fetch(API + path);
  if(!res.ok) throw new Error("API error " + res.status + " on " + path);
  setConn(true);
  return res.json();
}
async function apiGetProtected(path){
  const token = localStorage.getItem('medintel-token') || '';
  const res = await fetch(API + path, { headers: { 'Authorization': 'Bearer ' + token } });
  if(res.status === 401){ const e = new Error('unauthorized'); e.code = 401; throw e; }
  if(!res.ok) throw new Error("API error " + res.status + " on " + path);
  setConn(true);
  return res.json();
}
async function apiAuthFetch(path, options={}){
  const token = localStorage.getItem('medintel-token') || '';
  options.headers = Object.assign({ 'Authorization': 'Bearer ' + token }, options.headers || {});
  return fetch(API + path, options);
}
async function apiPost(path, body){
  const res = await fetch(API + path, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)});
  if(!res.ok) throw new Error("API error " + res.status + " on " + path);
  return res.json();
}

}

(function initCommandPalette(){
  const overlay = document.getElementById('cmdk-overlay');
  const input = document.getElementById('cmdk-input');
  const resultsBox = document.getElementById('cmdk-results');
  let activeIndex = 0;
  let currentResults = [];

  function open(){
    overlay.style.display = 'flex';
    input.value = '';
    input.focus();
    paint('');
  }
  function close(){ overlay.style.display = 'none'; }

  const staticPages = tabDefs.map(t => ({ label: t.label, type: 'Page', action: () => { activeTab = t.id; selectedCompanyId = null; render(); } }));

  async function paint(query){
    const q = query.toLowerCase().trim();
    let items = [];
    if(!q){
      items = staticPages;
    } else {
      items = staticPages.filter(p => p.label.toLowerCase().includes(q));
      try {
        const companies = await apiGet(`/companies?q=${encodeURIComponent(q)}&limit=6`);
        items = items.concat(companies.results.map(c => ({
          label: c.name, type: 'Company', sub: c.category,
          action: () => { activeTab = 'manufacturers'; openCompany(c.id); }
        })));
      } catch(e){}
      try {
        const products = await apiGet('/products');
        const matched = products.filter(p => p.product_name.toLowerCase().includes(q) || p.manufacturer_name.toLowerCase().includes(q)).slice(0, 6);
        items = items.concat(matched.map(p => ({
          label: p.product_name, type: 'Product', sub: p.manufacturer_name,
          action: () => {
            apiGet('/companies?q=' + encodeURIComponent(p.manufacturer_name.split(' (')[0])).then(r => {
              if(r.results[0]){ activeTab='manufacturers'; openCompany(r.results[0].id); }
            });
          }
        })));
      } catch(e){}
    }
    currentResults = items.slice(0, 12);
    activeIndex = 0;
    renderResults();
  }

  function renderResults(){
    if(currentResults.length === 0){
      resultsBox.innerHTML = '<div class="cmdk-empty">No matches.</div>';
      return;
    }
    resultsBox.innerHTML = currentResults.map((item, i) => `
      <div class="cmdk-item ${i===activeIndex?'active':''}" data-i="${i}">
        <span>${item.label}${item.sub ? ' <span style="color:var(--ink-muted);font-size:11.5px">— '+item.sub+'</span>' : ''}</span>
        <span class="cmdk-item-type">${item.type}</span>
      </div>`).join('');
    resultsBox.querySelectorAll('.cmdk-item').forEach(el => {
      el.onclick = () => { currentResults[+el.dataset.i].action(); close(); };
    });
  }

  document.addEventListener('keydown', e => {
    if((e.metaKey || e.ctrlKey) && e.key === 'k'){ e.preventDefault(); open(); }
    else if(e.key === 'Escape' && overlay.style.display !== 'none'){ close(); }
    else if(overlay.style.display !== 'none'){
      if(e.key === 'ArrowDown'){ e.preventDefault(); activeIndex = Math.min(activeIndex+1, currentResults.length-1); renderResults(); }
      else if(e.key === 'ArrowUp'){ e.preventDefault(); activeIndex = Math.max(activeIndex-1, 0); renderResults(); }
      else if(e.key === 'Enter' && currentResults[activeIndex]){ currentResults[activeIndex].action(); close(); }
    }
  });
  overlay.addEventListener('click', e => { if(e.target === overlay) close(); });
  input.addEventListener('input', () => paint(input.value));
})();

async function loadManufacturerGrid(){
  const grid = document.getElementById('grid');
  const q = document.getElementById('search')?.value || '';
  const status = document.getElementById('status-filter')?.value || '';
  const category = document.getElementById('category-filter')?.value || '';
  const origin = document.getElementById('origin-filter')?.value || '';
  try{
    let path = '/companies?limit=100&';
    if(q) path += `q=${encodeURIComponent(q)}&`;
    if(status) path += `status=${status}&`;
    if(origin) path += `origin=${encodeURIComponent(origin)}&`;
    if(category) path += `category=${encodeURIComponent(category)}`;
    const response = await apiGet(path);
    const items = response.results;
    let watchedIds = new Set();
    if(localStorage.getItem('medintel-token')){
      try { const w = await apiGetProtected('/watchlist'); watchedIds = new Set(w.map(x=>x.id)); } catch(e){}
    }
    if(items.length===0){ grid.innerHTML = '<div class="empty">No matching companies. Try clearing the filter, or add one.</div>'; return; }
    grid.innerHTML = items.map(m => `
      <div class="card" onclick="openCompany(${m.id})">
        <div class="card-top">
          <div><h3>${m.name}</h3><div class="meta">${originFlag(m.origin)} ${m.headquarters} · ${m.category} · ${m.portfolio}</div></div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <button class="star-btn ${watchedIds.has(m.id)?'starred':''}" onclick="event.stopPropagation();toggleWatch(${m.id}, this)" title="Add to watchlist">${watchedIds.has(m.id)?'★':'☆'}</button>
            ${badge(m.status_tag, m.status_tag==='open'?'Open opportunity':m.status_tag==='unclear'?'Needs outreach':'Covered')}
            ${badge(m.confidence_tier, m.confidence_tier.toUpperCase())}
          </div>
        </div>
        ${manufacturerContactRow(m)}
      </div>
    `).join('');
  } catch(err){ grid.innerHTML = `<div class="conn-error">${err.message}</div>`; }
}
async function toggleWatch(id, btn){
  if(!localStorage.getItem('medintel-token')){
    showToast('Log in first (Leads & Follow-up in the sidebar) to use the watchlist', true);
    return;
  }
  const key = localStorage.getItem('medintel-token');
  const isStarred = btn.classList.contains('starred');
  try {
    const res = await fetch(API + `/watchlist/${id}`, { method: isStarred ? 'DELETE' : 'POST', headers: { 'Authorization': 'Bearer ' + key } });
    if(res.status === 401){ showToast('Session expired — please log in again', true); return; }
    btn.classList.toggle('starred');
    btn.textContent = btn.classList.contains('starred') ? '★' : '☆';
  } catch(e){ showToast('Could not update watchlist', true); }
}

let pendingUnlockRender = null;
let authMode = 'login';
function renderOppLock(main, errMsg){
  main.innerHTML = `
    <div class="opp-lock-screen">
      <div class="opp-lock-icon">🔒</div>
      <h2>${authMode === 'login' ? 'Log in' : 'Create an account'}</h2>
      <p>This section holds your private sales data — leads, watchlist, and opportunities. Each account only ever sees its own data.</p>
      ${errMsg ? `<div class="opp-lock-error">${errMsg}</div>` : ''}
      <div class="opp-lock-form" style="flex-direction:column;align-items:stretch">
        ${authMode === 'register' ? '<input type="text" id="auth-company" placeholder="Company name">' : ''}
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-password" placeholder="Password" onkeydown="if(event.key==='Enter')submitAuth()">
        <button class="primary" onclick="submitAuth()">${authMode === 'login' ? 'Log in' : 'Create account'}</button>
        <button style="background:none;border:none;color:var(--ent-cyan);font-size:12px;cursor:pointer;padding:6px" onclick="authMode = authMode==='login'?'register':'login'; renderOppLock(document.getElementById('main'))">

        </button>
      </div>
    </div>`;
  document.getElementById('auth-email').focus();
}
async function submitAuth(){
  const email = document.getElementById('auth-email').value;
  const password = document.getElementById('auth-password').value;
  if(!email || !password){ renderOppLock(document.getElementById('main'), 'Enter email and password.'); return; }
  const path = authMode === 'login' ? '/auth/login' : '/auth/register';
  const body = authMode === 'login'
    ? { email, password }
    : { email, password, company_name: document.getElementById('auth-company')?.value || '' };
  if(authMode === 'register' && !body.company_name){ renderOppLock(document.getElementById('main'), 'Company name is required.'); return; }
  try {
    const res = await fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if(!res.ok){ renderOppLock(document.getElementById('main'), data.detail || 'Something went wrong.'); return; }
    localStorage.setItem('medintel-token', data.access_token);
    localStorage.setItem('medintel-user', JSON.stringify(data.user));
    showToast(`Welcome, ${data.user.full_name || data.user.company_name}`);
    if(pendingUnlockRender) pendingUnlockRender();
    renderNav();
  } catch(e){ renderOppLock(document.getElementById('main'), 'Could not reach the server.'); }
}

      document.getElementById('kg-list').innerHTML = companies.map(c => {

        const techNodes = rel.filter(e=>e.relation==='uses').map(e => kg.nodes.find(n=>n.id===e.target)?.label).filter(Boolean);
        const distNodes = rel.filter(e=>e.relation==='distributes').map(e => kg.nodes.find(n=>n.id===e.source)?.label).filter(Boolean);
        return `
        <div class="kg-node-card">

          <div class="kg-node-rels">
            ${productNodes.length ? `<div class="kg-rel"><span class="kg-rel-label">Products</span>${productNodes.map(p=>`<span class="kg-chip kg-chip-product">${p}</span>`).join('')}</div>` : ''}
            ${techNodes.length ? `<div class="kg-rel"><span class="kg-rel-label">Technologies</span>${techNodes.map(t=>`<span class="kg-chip kg-chip-tech">${t}</span>`).join('')}</div>` : ''}

const PRODUCT_TYPE_ICONS = {
  analyzer: '<rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a4 4 0 018 0v2"/><circle cx="12" cy="14" r="2.5"/>',
  reagent: '<path d="M9 3h6M10 3v5l-5 9a2 2 0 001.7 3h10.6a2 2 0 001.7-3l-5-9V3"/>',
  kit: '<rect x="4" y="7" width="16" height="13" rx="2"/><path d="M4 11h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2"/>',
  bag: '<path d="M6 8h12l-1 12a2 2 0 01-2 2H9a2 2 0 01-2-2L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/>',
  software: '<rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 18v3"/>',
  default: '<circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/>',
};
function extractSpecs(text){
  if(!text) return [];
  const specs = [];
  const cap = text.match(/(\d{2,5})\s*L\b/i);
  if(cap) specs.push(cap[1] + 'L');
  const temp = text.match(/-\d{2,3}\s*C\b/i);
  if(temp) specs.push(temp[0].replace(/\s+/g,''));
  const volt = text.match(/\d{2,3}(?:[~\-–]\d{2,3})?\s*V\b/i);
  if(volt) specs.push(volt[0].replace(/\s+/g,''));
  return [...new Set(specs)].slice(0,3);
}
function certBadges(certifications){
  if(!certifications) return '';
  return certifications.split(';').map(c => `<span class="cert-badge">${c.trim().split(':')[0]}</span>`).join('');
}
function productIcon(ptype){
  const t = (ptype||'').toLowerCase();
  if(t.includes('analyzer')||t.includes('instrument')||t.includes('platform')||t.includes('device')) return PRODUCT_TYPE_ICONS.analyzer;
  if(t.includes('reagent')||t.includes('assay')||t.includes('kit')) return PRODUCT_TYPE_ICONS.kit;
  if(t.includes('bag')||t.includes('collection')) return PRODUCT_TYPE_ICONS.bag;
  if(t.includes('software')||t.includes('informatics')||t.includes('data')) return PRODUCT_TYPE_ICONS.software;
  return PRODUCT_TYPE_ICONS.default;
}

    activeTab = tab;
  } else if(category){
    activeTab = 'manufacturers';
  }
  render();
  if(category && activeTab === 'manufacturers'){
    const trySetCategory = (attemptsLeft) => {
      const sel = document.getElementById('category-filter');
      if(sel){
        sel.value = decodeURIComponent(category);
        loadManufacturerGrid();
      } else if(attemptsLeft > 0){
        setTimeout(() => trySetCategory(attemptsLeft - 1), 150);
      }
    };
    trySetCategory(20);
  }
})();
</script>
</body>
</html>
