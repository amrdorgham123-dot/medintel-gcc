<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedIntel GCC — Blood Bank Intelligence Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16241F; --ink-soft:#4A5750; --ink-muted:#7C8A82;
    --paper:#F2F5F7; --surface:#FFFFFF; --surface-sunk:#EFF2EE; --border:#DCE1DC; --border-strong:#C3CBC3;
    --accent:#0E5C53; --accent-deep:#0A4038; --accent-soft:#E3F1EC;
    --gold:#9C7A1F; --gold-bg:#FBF2DA; --gold-brand:#CFA74A;
    --silver:#64707A; --silver-bg:#ECEFF1;
    --bronze:#8B4B26; --bronze-bg:#F6E7DC;
    --signal:#B3492E; --signal-bg:#FBEAE5;
    --sans:'Poppins',-apple-system,BlinkMacSystemFont,sans-serif;
    --display:'Playfair Display',Georgia,serif;
    --mono:'JetBrains Mono',SFMono-Regular,Menlo,monospace;
    --radius:10px;
    /* Enterprise chrome layer -- nav shell, topbar, KG/Regulatory pages */
    --ent-blue:#0B3B66; --ent-blue-deep:#072944; --ent-blue-soft:#E6EEF6;
    --ent-cyan:#1FA8C9; --ent-cyan-soft:#E3F6FB;
    --ent-emerald:#0F9D6B; --ent-emerald-soft:#E5F7EF;
    --ent-amber:#C58A1F; --ent-amber-soft:#FBF1DC;
    --ent-red:#C1432E; --ent-red-soft:#FBE9E5;
    --ent-ink:#101820; --ent-ink-soft:#4C5A68; --ent-line:#DDE4EA;
  }
  *{box-sizing:border-box;}
  *:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;font-size:14px;}
  ::selection{background:var(--accent-soft);color:var(--accent-deep);}

  .app{display:flex;min-height:100vh;}

  .sidebar{width:236px;flex-shrink:0;background:var(--ent-blue-deep);border-right:1px solid #051D30;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{padding:22px 20px 16px;}
  .brand-name{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.2px;color:#F1F6FA;}
  .brand-tagline{font-family:var(--sans);font-size:9px;letter-spacing:1.5px;color:var(--ent-cyan);text-transform:uppercase;margin-top:2px;font-weight:600;}
  .brand-tag{font-family:var(--mono);font-size:10.5px;color:#8FA8BE;margin-top:3px;}
  .ladder{display:flex;gap:4px;margin-top:12px;}
  .ladder span{width:22px;height:5px;border-radius:3px;}
  .ladder .g{background:var(--gold);} .ladder .s{background:var(--silver);} .ladder .b{background:var(--bronze);}
  .ladder-caption{font-family:var(--mono);font-size:9.5px;color:#8FA8BE;margin-top:6px;}

  nav.railnav{padding:8px 12px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
  nav.railnav .rail-group-label{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#5E7A93;padding:14px 12px 4px;}
  nav.railnav button{
    display:flex;align-items:center;gap:10px;background:none;border:none;text-align:left;
    padding:9px 12px;border-radius:8px;font-family:var(--sans);font-size:13.5px;font-weight:500;
    color:#B9CBDB;cursor:pointer;
  }
  nav.railnav button svg{width:16px;height:16px;flex-shrink:0;opacity:.75;}
  nav.railnav button:hover{background:rgba(255,255,255,.06);color:#F1F6FA;}
  nav.railnav button.active{background:var(--ent-cyan);color:var(--ent-blue-deep);font-weight:600;}
  nav.railnav button.active svg{opacity:1;}

  .rail-footer{padding:14px 20px 18px;border-top:1px solid rgba(255,255,255,.08);}
  .conn-chip{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:#8FA8BE;}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:#5E7A93;}
  .conn-dot.live{background:var(--ent-emerald);}
  .conn-dot.down{background:var(--ent-red);}

  .main-col{flex:1;min-width:0;}
  .topbar{display:flex;align-items:center;gap:14px;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:5;}
  .topbar h1{font-size:17px;margin:0;font-weight:700;flex-shrink:0;font-family:var(--display);color:var(--ent-blue);}
  .topbar-icons{display:flex;align-items:center;gap:6px;margin-left:auto;}
  .topbar-icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);cursor:pointer;position:relative;}
  .topbar-icon-btn:hover{background:var(--surface-sunk);}
  .topbar-icon-btn svg{width:16px;height:16px;}
  .topbar-icon-btn .dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--ent-red);}
  .breadcrumb{font-family:var(--mono);font-size:10.5px;color:var(--ink-muted);padding:9px 32px 0;}
  .breadcrumb span.sep{margin:0 5px;opacity:.5;}
  .breadcrumb span.cur{color:var(--ent-blue);font-weight:600;}
  .search-wrap{flex:1;max-width:420px;position:relative;}
  .search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;background:var(--surface-sunk);}
  .search-wrap input:focus{background:var(--surface);}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ink-muted);}
  .search-hint{font-family:var(--mono);font-size:10.5px;color:var(--ink-muted);}

  main{padding:16px 32px 60px;max-width:960px;}


  button.primary{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);}
  button.primary:hover{background:var(--accent-deep);}
  button.ghost{background:none;border:1px solid var(--border-strong);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--ink-soft);font-family:var(--sans);}
  button.ghost:hover{background:var(--surface-sunk);}
  select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;background:var(--surface);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap;}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px;}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
  .metric .num{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--accent-deep);}
  .metric .label{font-size:12px;color:var(--ink-soft);margin-top:3px;}

  .section-title{font-size:13px;font-weight:600;margin:0 0 12px;color:var(--ink);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;justify-content:space-between;}
  .section{margin-bottom:30px;}
  .section-link{font-family:var(--sans);font-size:11px;text-transform:none;letter-spacing:0;font-weight:600;color:var(--ent-blue);cursor:pointer;}
  .dash-cols{display:grid;grid-template-columns:1.3fr 1fr;gap:32px;align-items:start;}
  @media(max-width:800px){ .dash-cols{grid-template-columns:1fr;} }

  .grid{display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
  .card:hover{border-color:var(--accent);box-shadow:0 1px 3px rgba(11,110,92,.08);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
  .card-top h3{margin:0;font-size:14.5px;font-weight:600;}
  .card-top .meta{font-size:12px;color:var(--ink-soft);margin-top:4px;}

  .badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;white-space:nowrap;letter-spacing:.2px;}
  .badge.gold{background:var(--gold-bg);color:var(--gold);}
  .badge.silver{background:var(--silver-bg);color:var(--silver);}
  .badge.bronze{background:var(--bronze-bg);color:var(--bronze);}
  .badge.open{background:var(--signal-bg);color:var(--signal);}
  .badge.unclear{background:var(--gold-bg);color:var(--gold);}
  .badge.covered{background:var(--silver-bg);color:var(--silver);}

  .score-num{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent-deep);}
  .score-bar-track{background:var(--border);border-radius:5px;height:8px;overflow:hidden;margin:8px 0;}
  .score-bar-fill{background:var(--accent);height:100%;}

  .row{display:flex;gap:10px;margin-bottom:9px;font-size:13.5px;}
  .row .label{min-width:150px;font-weight:600;color:var(--ink);flex-shrink:0;}
  .row .val{color:var(--ink-soft);}

  .source-trace{margin-top:8px;padding:11px 13px;background:var(--accent-soft);border-radius:8px;font-family:var(--mono);font-size:11.5px;color:var(--accent-deep);line-height:1.65;}
  .insight-box{background:var(--surface-sunk);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:13px 16px;font-size:13.5px;color:var(--ink-soft);margin-bottom:20px;}
  .insight-box b{color:var(--ink);}

  .conf-days{font-family:var(--mono);font-weight:600;color:var(--accent-deep);}
  .conf-days.past{color:var(--signal);}

  .not-verified{font-style:italic;color:var(--gold);background:var(--gold-bg);padding:9px 12px;border-radius:8px;font-size:12.5px;}
  .empty{font-size:13px;color:var(--ink-muted);font-style:italic;padding:24px 0;}
  .conn-error{background:var(--signal-bg);color:var(--signal);padding:16px 18px;border-radius:var(--radius);font-size:13px;}

  .skel{background:linear-gradient(90deg,var(--surface-sunk) 25%,var(--border) 37%,var(--surface-sunk) 63%);background-size:400% 100%;border-radius:var(--radius);height:64px;margin-bottom:10px;}
  @media (prefers-reduced-motion: no-preference){ .skel{animation:shimmer 1.4s ease infinite;} }
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}

  .detail-back{background:none;border:none;color:var(--accent-deep);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:18px;padding:0;display:flex;align-items:center;gap:5px;}
  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px;}
  .detail-head h2{margin:0;font-size:23px;font-weight:700;font-family:var(--display);color:var(--accent-deep);}
  .detail-head .meta{font-size:13px;color:var(--ink-soft);margin-top:4px;}
  .detail-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
  .detail-tabs button{background:none;border:none;font-size:13px;font-weight:600;padding:9px 12px;cursor:pointer;color:var(--ink-muted);border-bottom:2px solid transparent;font-family:var(--sans);}
  .detail-tabs button.active{color:var(--accent-deep);border-bottom-color:var(--accent);}

  .modal-backdrop{position:fixed;inset:0;background:rgba(22,36,31,.5);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px;overflow-y:auto;z-index:50;}
  .modal{background:var(--surface);border-radius:14px;padding:26px;max-width:480px;width:100%;}
  .modal h3{margin:0 0 4px;font-size:17px;}
  .modal .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px;line-height:1.5;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px;}
  .field input, .field select, .field textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

  .toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:100;}
  .toast{background:var(--ink);color:var(--paper);padding:12px 16px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.18);max-width:320px;}
  .toast.err{background:var(--signal);}

  @media (max-width: 760px){
    .sidebar{position:fixed;left:-236px;transition:left .18s;z-index:20;box-shadow:2px 0 12px rgba(0,0,0,.08);}
    .sidebar.open{left:0;}
    .menu-btn{display:flex !important;}
    main{padding:20px 16px 50px;}
    .topbar{padding:14px 16px;}
  }
  .menu-btn{display:none;background:none;border:1px solid var(--border);border-radius:8px;padding:7px;cursor:pointer;}

  /* ===== Attieh Medico showcase page — distinct brand skin, scoped to .attieh-page ===== */
  .attieh-page{
    --a-navy:#132A2E; --a-navy-deep:#0B1C1F; --a-cream:#FBF7EE; --a-cream-line:#E7DEC8;
    --a-brass:#B0812E; --a-brass-soft:#F1E4C6; --a-ink:#26312F; --a-ink-soft:#5B6663;
    margin:-28px -32px -60px; background:var(--a-cream); font-family:var(--sans);
  }
  .attieh-hero{
    background:radial-gradient(1100px 460px at 12% -10%, #1D3D42 0%, var(--a-navy) 46%, var(--a-navy-deep) 100%);
    color:#F4EFE1; padding:56px 44px 40px; position:relative; overflow:hidden;
  }
  .attieh-hero::after{
    content:""; position:absolute; right:-60px; top:-60px; width:340px; height:340px; border-radius:50%;
    background:radial-gradient(circle, rgba(176,129,46,.22) 0%, transparent 70%);
  }
  .attieh-eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--a-brass); opacity:.95;}
  .attieh-hero h1{font-family:var(--display); font-weight:700; font-size:44px; line-height:1.05; margin:10px 0 4px; letter-spacing:-.5px;}
  .attieh-hero .ar-name{font-family:var(--sans); font-size:17px; color:#CFC7AE; margin-bottom:14px;}
  .attieh-hero .tagline{font-size:15px; max-width:560px; color:#DCD5C1; line-height:1.6;}
  .coverage-strip{display:flex; flex-wrap:wrap; gap:8px; margin-top:26px;}
  .coverage-chip{
    font-family:var(--mono); font-size:11px; color:#F4EFE1; background:rgba(255,255,255,.08);
    border:1px solid rgba(244,239,225,.28); border-radius:999px; padding:6px 13px; letter-spacing:.3px;
  }
  .coverage-chip b{color:var(--a-brass); font-weight:700; margin-right:5px;}
  .attieh-stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1px; background:var(--a-cream-line); border-top:1px solid var(--a-cream-line); border-bottom:1px solid var(--a-cream-line);}
  .attieh-stat{background:var(--a-cream); padding:20px 24px;}
  .attieh-stat .n{font-family:var(--display); font-weight:700; font-size:30px; color:var(--a-navy);}
  .attieh-stat .l{font-family:var(--sans); font-size:11.5px; color:var(--a-ink-soft); margin-top:2px; text-transform:uppercase; letter-spacing:.6px;}
  .attieh-body{padding:44px 44px 56px;}
  .attieh-section{margin-bottom:42px;}
  .attieh-section-head{display:flex; align-items:baseline; gap:12px; margin-bottom:16px; border-bottom:1.5px solid var(--a-navy); padding-bottom:9px;}
  .attieh-section-head h2{font-family:var(--display); font-size:21px; color:var(--a-navy); margin:0; font-weight:700;}
  .attieh-section-head .count{font-family:var(--mono); font-size:12px; color:var(--a-brass); font-weight:600;}
  .attieh-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px;}
  .attieh-card{
    background:#fff; border:1px solid var(--a-cream-line); border-radius:4px; padding:17px 18px;
    position:relative; transition:box-shadow .15s, transform .15s;
  }
  .attieh-card:hover{box-shadow:0 6px 18px rgba(19,42,46,.1); transform:translateY(-2px);}
  .attieh-card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--a-brass); border-radius:4px 0 0 4px;}
  .attieh-card h3{font-family:var(--display); font-size:16px; margin:0 0 4px; color:var(--a-navy); font-weight:700;}
  .attieh-card .country{font-family:var(--mono); font-size:10.5px; color:var(--a-brass); text-transform:uppercase; letter-spacing:.5px;}
  .attieh-card p{font-size:12.5px; color:var(--a-ink-soft); margin:8px 0 0; line-height:1.5;}
  .attieh-footer{
    background:var(--a-brass-soft); border-top:1px solid var(--a-cream-line); padding:20px 44px;
    font-size:11.5px; color:var(--a-ink-soft); line-height:1.6;
  }
  .attieh-footer b{color:var(--a-navy);}
  @media(max-width:640px){
    .attieh-page{margin:-20px -16px -40px;}
    .attieh-hero, .attieh-body, .attieh-footer{padding-left:20px; padding-right:20px;}
    .attieh-hero h1{font-size:32px;}
  }
  .attieh-banner{
    display:flex; align-items:center; justify-content:space-between; gap:16px; cursor:pointer;
    background:linear-gradient(120deg, #132A2E 0%, #1D3D42 100%); border-radius:12px;
    padding:18px 24px; margin-bottom:22px; transition:transform .15s, box-shadow .15s;
    border:1px solid #0B1C1F;
  }
  .attieh-banner:hover{transform:translateY(-1px); box-shadow:0 8px 22px rgba(19,42,46,.25);}
  .attieh-banner-eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#B0812E;}
  .attieh-banner-title{font-family:var(--display); font-weight:700; font-size:20px; color:#F4EFE1; margin-top:2px;}
  .attieh-banner-sub{font-family:var(--sans); font-size:12px; color:#CFC7AE; margin-top:3px;}
  .attieh-banner-cta{font-family:var(--sans); font-size:12.5px; font-weight:600; color:#F4EFE1; background:rgba(255,255,255,.1); border:1px solid rgba(244,239,225,.3); padding:9px 16px; border-radius:8px; white-space:nowrap;}
  @media(max-width:560px){ .attieh-banner{flex-direction:column; align-items:flex-start;} }
  .snibe-banner{
    display:flex; align-items:center; justify-content:space-between; gap:20px; cursor:pointer;
    background:linear-gradient(120deg, #08324A 0%, #0E4A68 100%); border-radius:12px;
    padding:20px 26px; margin-bottom:14px; transition:transform .15s, box-shadow .15s;
    border:1px solid #062338;
  }
  .snibe-banner:hover{transform:translateY(-1px); box-shadow:0 8px 22px rgba(8,50,74,.3);}
  .snibe-banner-left{flex:1; min-width:0;}
  .snibe-banner-eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#5CC9E8;}
  .snibe-banner-title{font-family:var(--display); font-weight:700; font-size:22px; color:#F0FAFD; margin-top:3px;}
  .snibe-banner-sub{font-family:var(--sans); font-size:12.5px; color:#AFDCEC; margin-top:4px; max-width:520px;}
  .snibe-chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:12px;}
  .snibe-chip{font-family:var(--mono); font-size:10.5px; color:#EAFAFF; background:rgba(255,255,255,.09); border:1px solid rgba(92,201,232,.35); border-radius:999px; padding:5px 12px;}
  .snibe-banner-cta{font-family:var(--sans); font-size:12.5px; font-weight:600; color:#062338; background:#5CC9E8; border:1px solid #5CC9E8; padding:10px 18px; border-radius:8px; white-space:nowrap;}
  @media(max-width:640px){ .snibe-banner{flex-direction:column; align-items:flex-start;} }
  .kg-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .kg-stat{background:var(--ent-blue-soft);border:1px solid var(--ent-line);border-radius:8px;padding:10px 16px;font-family:var(--sans);font-size:11.5px;color:var(--ent-ink-soft);}
  .kg-stat b{display:block;font-family:var(--display);font-size:20px;color:var(--ent-blue);font-weight:700;}
  .kg-filter{margin-bottom:16px;}
  .kg-filter input{width:100%;max-width:340px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;}
  .kg-list{display:flex;flex-direction:column;gap:10px;}
  .kg-node-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .kg-node-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-family:var(--sans);font-size:14px;}
  .kg-node-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .kg-node-dot.kg-company{background:var(--ent-blue);}
  .kg-node-cat{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-muted);text-transform:uppercase;}

function showToast(msg, isErr){
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function badge(tag, label){ return `<span class="badge ${tag}">${label}</span>`; }
const ORIGIN_STYLES = {
  American: {bg:'#E6F1FB', fg:'#0C447C', label:'US'},
  European: {bg:'#EAF3DE', fg:'#27500A', label:'EU'},
  Chinese: {bg:'#FAECE7', fg:'#712B13', label:'CN'},
  'Asian (other)': {bg:'#FAEEDA', fg:'#633806', label:'ASIA'},
};
function originFlag(origin){
  const s = ORIGIN_STYLES[origin];
  if(!s) return '';
  return `<span class="origin-flag" style="background:${s.bg};color:${s.fg}">${s.label}</span>`;
}
function dataCompleteness(){
  const resolved = DB.manufacturers.filter(m => m.status_tag === 'covered' || m.status_tag === 'open').length;
  return Math.round((resolved / DB.manufacturers.length) * 100);
}
function categories(){
  const map = {};
  DB.manufacturers.forEach(m => { map[m.category] = (map[m.category]||0) + 1; });
  return Object.entries(map).map(([category, c]) => ({category, c}));
}

function renderNav(){
  const nav = document.getElementById('railnav');
  nav.innerHTML = '';
  let lastGroup = null;
  tabDefs.forEach(t => {
    if(t.group !== lastGroup){
      const label = document.createElement('div');
      label.className = 'rail-group-label';
      label.textContent = t.group;
      nav.appendChild(label);
      lastGroup = t.group;
    }
    const btn = document.createElement('button');
    btn.className = t.id === activeTab ? 'active' : '';
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[t.id]}</svg>${t.label}`;
    btn.onclick = () => { activeTab = t.id; selectedCompanyId = null; document.getElementById('sidebar').classList.remove('open'); render(); };
    nav.appendChild(btn);
  });
  const curLabel = selectedCompanyId ? 'Company profile' : (tabDefs.find(t=>t.id===activeTab)?.label || (activeTab === 'updates' ? 'Recent updates' : ''));
  document.getElementById('page-title').textContent = curLabel;
  document.getElementById('breadcrumb').innerHTML = `MedIntel GCC<span class="sep">/</span><span class="cur">${curLabel}</span>`;
  const def = tabDefs.find(t=>t.id===activeTab);
  document.getElementById('search-wrap').style.display = (def && def.search && !selectedCompanyId) ? 'block' : 'none';
  document.getElementById('conn-dot').className = 'conn-dot live';
  document.getElementById('conn-text').textContent = 'Standalone · embedded data';
}

function loadManufacturerGrid(){
  const grid = document.getElementById('grid');
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const status = document.getElementById('status-filter')?.value || '';
  const category = document.getElementById('category-filter')?.value || '';
  const origin = document.getElementById('origin-filter')?.value || '';
  let items = DB.manufacturers;
  if(status) items = items.filter(m => m.status_tag === status);
  if(category) items = items.filter(m => m.category === category);
  if(origin) items = items.filter(m => m.origin === origin);
  if(q) items = items.filter(m => JSON.stringify(m).toLowerCase().includes(q));
  if(items.length===0){ grid.innerHTML = '<div class="empty">No matching companies.</div>'; return; }
  grid.innerHTML = items.map(m => `
    <div class="card" onclick="openCompany(${m.id})">
      <div class="card-top">
        <div><h3>${m.name}</h3><div class="meta">${originFlag(m.origin)} ${m.headquarters} · ${m.category} · ${m.portfolio}</div></div>

          ${badge(m.confidence_tier, m.confidence_tier.toUpperCase())}
        </div>
      </div>
    </div>
  `).join('');
}

      : `<div class="not-verified">No technology linkage recorded yet.</div>`;
  } else if(detailSubTab === 'distributors'){
    panel.innerHTML = m.distributors.length ? m.distributors.map(d => `<div class="row"><span class="label">${d.name}</span><span class="val">${d.country} — ${d.represents}</span></div>`).join('')
      : `<div class="not-verified">No confirmed distributor on file yet.</div>`;
  } else if(detailSubTab === 'regulatory'){
    panel.innerHTML = (m.regulatory && m.regulatory.length) ? m.regulatory.map(r => `
      <div class="row"><span class="label">${r.regulatory_body}${r.product_name ? ' — '+r.product_name : ''}</span><span class="val">${r.status}: ${r.detail}</span></div>
    `).join('') + `<div class="source-trace" style="margin-top:8px">Sources: ${[...new Set(m.regulatory.map(r=>r.source))].join('; ')}</div>`
      : `<div class="not-verified">No regulatory status recorded yet for this company — not yet researched, not a negative finding.</div>`;
  } else if(detailSubTab === 'opportunity'){
    if(m.opportunity){
      const total = m.opportunity.score_no_distributor + m.opportunity.score_confidence + m.opportunity.score_brand;
      panel.innerHTML = `
        <div class="score-num">${total}/10</div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${total/10*100}%"></div></div>
        <div class="row" style="margin-top:12px"><span class="label">Action</span><span class="val">${m.opportunity.action}</span></div>
      `;
    } else {
      panel.innerHTML = `<div class="not-verified">Not scored yet.</div>`;
    }
  } else if(detailSubTab === 'evidence'){
    panel.innerHTML = m.evidence.length ? m.evidence.map(e => `
      <div class="source-trace" style="margin-bottom:8px">
        <b style="color:var(--ink)">${e.claim}</b><br>Type: ${e.evidence_type}<br>Detail: ${e.source_detail}<br>Reviewed: ${e.reviewed_date}
      </div>`).join('')
      : `<div class="not-verified">No structured evidence recorded yet.</div>`;
  } else if(detailSubTab === 'score'){
    const tierPts = {gold:30, silver:18, bronze:6};
    const confPts = tierPts[m.confidence_tier] || 0;
    const prodPts = Math.min((m.products||[]).length * 5, 20);
    const techPts = Math.min((m.technologies||[]).length * 5, 15);
    const evPts = Math.min((m.evidence||[]).length * 5, 20);
    const eventPts = Math.min((m.events||[]).length * 5, 10);
    const distPts = m.status_tag === 'covered' ? 5 : 0;
    const total = confPts + prodPts + techPts + evPts + eventPts + distPts;
    panel.innerHTML = `
      <div class="score-num" style="font-size:36px">${total}<span style="font-size:16px;color:var(--ink-muted)">/100</span></div>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${total}%"></div></div>
      <div class="score-breakdown" style="margin-top:14px">
        <div style="margin-bottom:6px"><b>confidence tier</b>: ${confPts}/30 — tier = ${m.confidence_tier}</div>
        <div style="margin-bottom:6px"><b>product portfolio</b>: ${prodPts}/20 — ${(m.products||[]).length} products on file</div>
        <div style="margin-bottom:6px"><b>technology diversity</b>: ${techPts}/15 — ${(m.technologies||[]).length} technology links</div>
        <div style="margin-bottom:6px"><b>evidence coverage</b>: ${evPts}/20 — ${(m.evidence||[]).length} evidence entries</div>
        <div style="margin-bottom:6px"><b>market event history</b>: ${eventPts}/10 — ${(m.events||[]).length} logged events</div>
        <div style="margin-bottom:6px"><b>KSA status resolved</b>: ${distPts}/5 — ${m.status_tag}</div>
      </div>
      <p class="search-hint" style="margin-top:12px">Every point above is computed from real embedded-data counts — not an estimate.</p>
    `;
  } else if(detailSubTab === 'competitors'){
    const myTechIds = new Set((m.technologies||[]).map(t=>t.tid));
    const competitors = [];
    DB.manufacturers.forEach(other => {
      if(other.id === m.id) return;
      (other.technologies||[]).forEach(t => {
        if(myTechIds.has(t.tid)) competitors.push({name: other.name, category: other.category, shared_technology: t.name});
      });
    });
    panel.innerHTML = competitors.length ? competitors.map(c => `
      <div class="row"><span class="label">${c.name}</span><span class="val">${c.category} · shares: ${c.shared_technology}</span></div>
    `).join('') + `<p class="search-hint" style="margin-top:10px">Derived purely from shared Technology links already in the dataset.</p>`
      : `<div class="not-verified">No shared-technology links found for this company.</div>`;
  }
}

const PRODUCT_TYPE_ICONS = {
  analyzer: '<rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a4 4 0 018 0v2"/><circle cx="12" cy="14" r="2.5"/>',
  reagent: '<path d="M9 3h6M10 3v5l-5 9a2 2 0 001.7 3h10.6a2 2 0 001.7-3l-5-9V3"/>',
  kit: '<rect x="4" y="7" width="16" height="13" rx="2"/><path d="M4 11h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2"/>',
  bag: '<path d="M6 8h12l-1 12a2 2 0 01-2 2H9a2 2 0 01-2-2L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/>',
  software: '<rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 18v3"/>',
  default: '<circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/>',
};
function productIcon(ptype){
  const t = (ptype||'').toLowerCase();
  if(t.includes('analyzer')||t.includes('instrument')||t.includes('platform')||t.includes('device')) return PRODUCT_TYPE_ICONS.analyzer;
  if(t.includes('reagent')||t.includes('assay')||t.includes('kit')) return PRODUCT_TYPE_ICONS.kit;
  if(t.includes('bag')||t.includes('collection')) return PRODUCT_TYPE_ICONS.bag;
  if(t.includes('software')||t.includes('informatics')||t.includes('data')) return PRODUCT_TYPE_ICONS.software;
  return PRODUCT_TYPE_ICONS.default;
}

let compareIds = [];
function renderProducts(){
  const main = document.getElementById('main');
  const items = DB.products;
  const cats = [...new Set(items.map(p=>p.category))].sort();
  const mfrs = [...new Set(items.map(p=>p.manufacturer_name))].sort();
  const origins = [...new Set(items.map(p=>p.origin))].filter(Boolean).sort();
  main.innerHTML = `
    <div class="catalog-layout">
      <aside class="catalog-filters">
        <div class="cf-group"><div class="cf-title">Category</div>
          <select id="cf-category"><option value="">All categories (${items.length})</option>${cats.map(c=>`<option value="${c}">${c} (${items.filter(p=>p.category===c).length})</option>`).join('')}</select>
        </div>
        <div class="cf-group"><div class="cf-title">Origin</div>
          <select id="cf-origin"><option value="">All origins</option>${origins.map(o=>`<option value="${o}">${o} (${items.filter(p=>p.origin===o).length})</option>`).join('')}</select>
        </div>
        <div class="cf-group"><div class="cf-title">Manufacturer</div>
          <select id="cf-manufacturer"><option value="">All manufacturers (${mfrs.length})</option>${mfrs.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
        </div>
        <div class="cf-group"><div class="cf-title">Confidence tier</div>
          <select id="cf-tier"><option value="">All tiers</option><option value="gold">Gold</option><option value="silver">Silver</option><option value="bronze">Bronze</option></select>
        </div>
      </aside>
      <div class="catalog-main">
        <div class="searchbar"><input type="text" id="search" placeholder="Search products or manufacturers"></div>
        <div class="catalog-count" id="catalog-count"></div>
        <div class="catalog-grid" id="grid"></div>
      </div>
    </div>
    <div class="compare-bar" id="compare-bar" style="display:none">
      <span id="compare-count"></span>
      <button class="primary" onclick="goToCompare()">Compare selected →</button>
      <button onclick="compareIds=[];renderProducts()">Clear</button>
    </div>
  `;
  function paint(){
    const f = (document.getElementById('search').value||'').toLowerCase();
    const cat = document.getElementById('cf-category').value;
    const org = document.getElementById('cf-origin').value;
    const mfr = document.getElementById('cf-manufacturer').value;
    const tier = document.getElementById('cf-tier').value;
    const shown = items.filter(p =>
      (!f || p.product_name.toLowerCase().includes(f) || p.manufacturer_name.toLowerCase().includes(f)) &&
      (!cat || p.category===cat) && (!org || p.origin===org) && (!mfr || p.manufacturer_name===mfr) && (!tier || p.confidence_tier===tier)
    );
    document.getElementById('catalog-count').textContent = `${shown.length} product${shown.length!==1?'s':''}`;
    const grid = document.getElementById('grid');
    if(shown.length===0){ grid.innerHTML = '<div class="empty">No matching products.</div>'; return; }
    grid.innerHTML = shown.map(p => {
      const owner = DB.manufacturers.find(m => m.name === p.manufacturer_name);
      return `
      <div class="pcard">
        <label class="pcard-check" onclick="event.stopPropagation()">
          <input type="checkbox" ${compareIds.includes(p.id)?'checked':''} onchange="toggleCompare(${p.id})">
        </label>
        <div class="pcard-clickzone" onclick="${owner ? `openCompany(${owner.id})` : ''}">
          <div class="pcard-media"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${productIcon(p.product_type)}</svg></div>
          <div class="pcard-body">
            <div class="pcard-type">${originFlag(p.origin)}${p.product_type||''}</div>
            <h3 class="pcard-title">${p.product_name}</h3>
            <div class="pcard-mfr">${p.manufacturer_name}</div>
            <div class="pcard-desc">${p.description}</div>
            <div class="pcard-foot">${badge(p.confidence_tier, p.confidence_tier.toUpperCase())}<span class="pcard-cat">${p.category}</span></div>
          </div>
        </div>
      </div>`;
    }).join('');
    updateCompareBar();
  }
  document.getElementById('search').oninput = paint;
  document.getElementById('cf-category').onchange = paint;
  document.getElementById('cf-origin').onchange = paint;
  document.getElementById('cf-manufacturer').onchange = paint;
  document.getElementById('cf-tier').onchange = paint;
  paint();
}
function toggleCompare(id){
  const i = compareIds.indexOf(id);
  if(i>-1) compareIds.splice(i,1); else { if(compareIds.length>=6){ showToast('Compare at most 6 products at a time', true); return; } compareIds.push(id); }
  updateCompareBar();
}
function updateCompareBar(){
  const bar = document.getElementById('compare-bar');
  if(!bar) return;
  if(compareIds.length>=2){
    bar.style.display = 'flex';
    document.getElementById('compare-count').textContent = `${compareIds.length} products selected`;
  } else { bar.style.display = 'none'; }
}
function goToCompare(){ activeTab='compare'; render(); }

function renderCompare(){
  const main = document.getElementById('main');
  if(compareIds.length < 2){
    main.innerHTML = `<div class="empty">Select at least 2 products from the Products catalog to compare.</div>
      <button class="primary" style="margin-top:12px" onclick="activeTab='products';render()">Go to Products →</button>`;
    return;
  }
  const products = compareIds.map(id => DB.products.find(p => p.id === id)).filter(Boolean).map(p => {
    const owner = DB.manufacturers.find(m => m.name === p.manufacturer_name);
    const dists = owner ? owner.distributors.map(d=>d.name) : [];
    return {...p, distributors: dists};
  });
  const fieldMap = [
    ['product_name','Product'], ['manufacturer_name','Manufacturer'], ['origin','Origin'], ['category','Category'],
    ['department','Department'], ['product_type','Type'], ['throughput','Throughput'], ['sample_types','Sample types'],
    ['certifications','Certifications'], ['confidence_tier','Confidence'], ['distributors','KSA distributor(s)'], ['description','Description']
  ];
  main.innerHTML = `
    <p class="search-hint" style="margin-bottom:14px">Comparing ${products.length} products, side by side — every field pulled directly from verified records.</p>
    <div class="compare-table-wrap">
      <table class="compare-table">
        <thead><tr><th>Field</th>${products.map(p=>`<th>${p.product_name}</th>`).join('')}</tr></thead>
        <tbody>
          ${fieldMap.map(([f,label]) => `
            <tr>
              <td class="field-label">${label}</td>
              ${products.map(p => {
                let v = p[f];
                if(f==='origin') v = originFlag(v) + (v||'');
                else if(f==='confidence_tier') v = badge(v, (v||'').toUpperCase());
                else if(f==='distributors') v = (v && v.length) ? v.join(', ') : '<span style="color:var(--ink-muted)">Not on file</span>';
                else v = v || '<span style="color:var(--ink-muted)">—</span>';
                return `<td>${v}</td>`;
              }).join('')}
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <button style="margin-top:16px" onclick="compareIds=[];activeTab='products';render()">Clear and go back</button>
  `;
}

    <div class="row" style="margin-top:8px"><span class="label">Companies</span><span class="val">${t.companies.join(', ')||'None linked yet'}</span></div></div>`).join('')}</div>`;
}

function renderDataQuality(){
  const main = document.getElementById('main');
  const tierMap = {gold:100, silver:65, bronze:30};
  const counts = {gold:0, silver:0, bronze:0};
  let totalScore = 0;
  DB.manufacturers.forEach(m => { counts[m.confidence_tier]++; totalScore += tierMap[m.confidence_tier]||0; });
  const avg = Math.round((totalScore/DB.manufacturers.length)*10)/10;
  const needsReview = DB.manufacturers.filter(m => m.status_tag==='unclear' || m.confidence_tier==='bronze').length;
  const missingEvidence = DB.manufacturers.filter(m => m.evidence.length===0).length;
  main.innerHTML = `
    <p class="search-hint" style="margin-bottom:20px">Every number below is computed live from the embedded dataset in this file, not estimated.</p>
    <div class="metrics">
      <div class="metric"><div class="num">${DB.manufacturers.length}</div><div class="label">Total companies</div></div>
      <div class="metric"><div class="num">${avg}</div><div class="label">Avg. confidence (gold=100/silver=65/bronze=30)</div></div>
      <div class="metric"><div class="num">${needsReview}</div><div class="label">Need review</div></div>
      <div class="metric"><div class="num">${missingEvidence}</div><div class="label">Missing structured evidence</div></div>
    </div>
    <div class="section"><div class="section-title">Confidence tier breakdown</div>
      <div class="row"><span class="label">Gold</span><span class="val">${counts.gold} companies</span></div>
      <div class="row"><span class="label">Silver</span><span class="val">${counts.silver} companies</span></div>
      <div class="row"><span class="label">Bronze</span><span class="val">${counts.bronze} companies</span></div>
    </div>
    <div class="section"><div class="section-title">Categories</div>
      ${categories().map(c => `<div class="row"><span class="label">${c.category}</span><span class="val">${c.c} companies</span></div>`).join('')}
    </div>
  `;
}

const ATTIEH_GROUPS = [
  { title: "IVF & Reproductive Lab", match: ["Hamilton Thorne","Cooper Surgical","Vitrolife","Sparmed","Cryobiosystem","Cryologic","Planer"] },
  { title: "Imaging & Cytogenetics", match: ["Carl Zeiss","MetaSystems"] },
  { title: "Lab Infrastructure & Cold Chain", match: ["MVE Biological Solutions","Azbil Telstar","Desmon Scientific","Memmert","Gonotec","Deltalab"] },
];

function renderAttiehPortfolio(){
  const main = document.getElementById('main');
  const items = DB.attieh;
  const countries = new Set(items.map(a => a.country));
  const grouped = ATTIEH_GROUPS.map(g => ({
    title: g.title,
    items: items.filter(a => g.match.includes(a.manufacturer))
  }));
  const placed = new Set(grouped.flatMap(g => g.items.map(i => i.manufacturer)));
  const other = items.filter(a => !placed.has(a.manufacturer));
  if (other.length) grouped.push({ title: "Other Confirmed Principals", items: other });

  main.innerHTML = `
    <div class="attieh-page">
      <div class="attieh-hero">
        <div class="attieh-eyebrow">NUPCO-Confirmed Principal Portfolio</div>
        <h1>Attieh Medico</h1>

        <p class="tagline">A Jeddah-founded medical equipment distributor operating since 1992, part of the Attieh Group (roots in Saudi trade and industry since 1957). Below is the confirmed set of manufacturers Attieh Medico represents, sourced directly from official NUPCO tender award records — not a market opportunity list.</p>
        <div class="coverage-strip">
          <span class="coverage-chip"><b>1992</b>HQ Jeddah</span>
          <span class="coverage-chip"><b>1999</b>Abha</span>
          <span class="coverage-chip"><b>2003</b>Tabuk</span>
          <span class="coverage-chip">Riyadh</span>
          <span class="coverage-chip">Al Khobar</span>
          <span class="coverage-chip">Madinah</span>
          <span class="coverage-chip">Qassim</span>
        </div>
      </div>
      <div class="attieh-stats">
        <div class="attieh-stat"><div class="n">${items.length}</div><div class="l">Confirmed Principals</div></div>
        <div class="attieh-stat"><div class="n">${countries.size}</div><div class="l">Countries of Origin</div></div>
        <div class="attieh-stat"><div class="n">7</div><div class="l">KSA Regional Offices</div></div>
        <div class="attieh-stat"><div class="n">30+</div><div class="l">Years Operating</div></div>
      </div>
      <div class="attieh-body">
        ${grouped.filter(g => g.items.length).map(g => `
          <div class="attieh-section">
            <div class="attieh-section-head"><h2>${g.title}</h2><span class="count">${g.items.length} principal${g.items.length>1?'s':''}</span></div>
            <div class="attieh-grid">
              ${g.items.map(a => `
                <div class="attieh-card">
                  <h3>${a.manufacturer}</h3>
                  <div class="country">${a.country}</div>
                  <p>${a.domain}</p>
                </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>
      <div class="attieh-footer">
        <b>Sourcing note:</b> every principal listed above is drawn from official NUPCO Final Awardation records naming Attieh Medico as the awarded vendor. This page reflects Attieh Medico's own existing, confirmed portfolio; it is not a prospecting or lead-generation list.
      </div>
    </div>
  `;
}

function render(){
  renderNav();
  if(selectedCompanyId){ renderCompanyDetail(); return; }
  if(selectedDistributor){ renderDistributorDetail(); return; }
  if(activeTab==='dashboard') renderDashboard();
  if(activeTab==='manufacturers') renderManufacturers();
  if(activeTab==='opportunities') renderOpportunities();
  if(activeTab==='distributors') renderDistributors();
  if(activeTab==='conferences') renderConferences();
  if(activeTab==='technologies') renderTechnologies();
  if(activeTab==='quality') renderDataQuality();
  if(activeTab==='attieh') renderAttiehPortfolio();

  if(activeTab==='hospitals') renderHospitals();
  if(activeTab==='products') renderProducts();
  if(activeTab==='events') renderMarketEvents();
  if(activeTab==='kg') renderKnowledgeGraph();
  if(activeTab==='regulatory') renderRegulatory();
  if(activeTab==='updates') renderUpdates();
  if(activeTab==='compare') renderCompare();
}

render();
</script>
